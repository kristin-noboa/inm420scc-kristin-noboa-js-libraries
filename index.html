<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristin's Wingspan Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="./src/css/tailwind.css" rel="stylesheet">
    <link rel="stylesheet" href="./node_modules/@glidejs/glide/dist/css/glide.core.min.css">
    <link rel="stylesheet" href="./node_modules/@glidejs/glide/dist/css/glide.theme.min.css">
  </head>

  <body class="min-h-screen bg-fixed bg-cover bg-center relative" style="background-image: url('./public/assets/background.jpg');">
    <div class="fixed inset-0 bg-white/30 pointer-events-none"></div>
    <div class="relative max-w-[1400px] mx-auto px-4 md:px-6 pt-16 pb-10">
      <!-- Header -->
      <header class="mb-6 md:mb-8 text-center">
        <h1 class="text-7xl font-extrabold text-pink-400">Kristin's Wingspan Tracker</h1>
        <p class="mt-3 text-xl text-pink-500">Tracking 1v1 Wingspan scores with every bird, bonus, and egg along the way.</p>
      </header>

      <!-- Bird Card Carousel -->
      <div class="mb-8 md:mb-14 pt-4 pb-10">
        <div class="glide" id="bird-carousel">
          <div class="glide__track" data-glide-el="track">
            <ul class="glide__slides">
              <li class="glide__slide flex justify-center">
                <div class="bg-white/80 rounded-2xl overflow-hidden shadow-md max-w-[300px]">
                  <img src="./public/assets/birds/black_naped_oriole.png" alt="Black-naped Oriole" class="w-full h-auto" />
                </div>
              </li>
              <li class="glide__slide flex justify-center">
                <div class="bg-white/80 rounded-2xl overflow-hidden shadow-md max-w-[300px]">
                  <img src="./public/assets/birds/common_raven.png" alt="Common Raven" class="w-full h-auto" />
                </div>
              </li>
              <li class="glide__slide flex justify-center">
                <div class="bg-white/80 rounded-2xl overflow-hidden shadow-md max-w-[300px]">
                  <img src="./public/assets/birds/common_tailorbird.png" alt="Common Tailorbird" class="w-full h-auto" />
                </div>
              </li>
              <li class="glide__slide flex justify-center">
                <div class="bg-white/80 rounded-2xl overflow-hidden shadow-md max-w-[300px]">
                  <img src="./public/assets/birds/peregrine_falcon.png" alt="Peregrine Falcon" class="w-full h-auto" />
                </div>
              </li>
              <li class="glide__slide flex justify-center">
                <div class="bg-white/80 rounded-2xl overflow-hidden shadow-md max-w-[300px]">
                  <img src="./public/assets/birds/spotted_sandpiper.png" alt="Spotted Sandpiper" class="w-full h-auto" />
                </div>
              </li>
              <li class="glide__slide flex justify-center">
                <div class="bg-white/80 rounded-2xl overflow-hidden shadow-md max-w-[300px]">
                  <img src="./public/assets/birds/yellowhammer.png" alt="Yellowhammer" class="w-full h-auto" />
                </div>
              </li>
            </ul>
          </div>
          <div class="glide__arrows" data-glide-el="controls">
            <button class="glide__arrow glide__arrow--left" data-glide-dir="<" aria-label="Previous">&lt;</button>
            <button class="glide__arrow glide__arrow--right" data-glide-dir=">" aria-label="Next">&gt;</button>
          </div>
          <div class="glide__bullets" data-glide-el="controls[nav]">
            <button class="glide__bullet" data-glide-dir="=0" aria-label="Slide 1"></button>
            <button class="glide__bullet" data-glide-dir="=1" aria-label="Slide 2"></button>
            <button class="glide__bullet" data-glide-dir="=2" aria-label="Slide 3"></button>
            <button class="glide__bullet" data-glide-dir="=3" aria-label="Slide 4"></button>
            <button class="glide__bullet" data-glide-dir="=4" aria-label="Slide 5"></button>
            <button class="glide__bullet" data-glide-dir="=5" aria-label="Slide 6"></button>
          </div>
        </div>
      </div>

      <!-- Rolling Average Chart -->
      <div class="mb-6 md:mb-12 rounded-xl overflow-x-auto bg-white/80">
        <div id="chart" style="min-width: 600px; height: 400px;"></div>
      </div>

      <!-- Net Record Chart -->
      <div class="mb-6 md:mb-12 rounded-xl overflow-x-auto bg-white/80">
        <div id="record-chart" style="min-width: 600px; height: 350px;"></div>
      </div>

      <!-- AG Grid Table -->
      <div id="grid" class="ag-theme-quartz" style="width: 100%;"></div>
    </div>

    <script src="./node_modules/@glidejs/glide/dist/glide.min.js"></script>
    <script src="./node_modules/ag-charts-community/dist/umd/ag-charts-community.js"></script>
    <script src="./src/js/main.js" type="module"></script>
  </body>
</html>
